{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card" style="max-width:460px;">
    <div class="auth-brand">Stock</div>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Commencez à gérer votre stock.</p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
          <button class="alert-close">×</button>
        </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="first_name">Prénom</label>
          <input
            type="text"
            id="first_name"
            name="first_name"
            class="form-input"
            placeholder="Prénom"
            value="{{ first_name|default:'' }}"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="last_name">Nom</label>
          <input
            type="text"
            id="last_name"
            name="last_name"
            class="form-input"
            placeholder="Nom"
            value="{{ last_name|default:'' }}"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="Jean@gmail.com"
          value="{{ email|default:'' }}"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
        <span class="form-hint">Au moins 8 caractères, un chiffre et un caractère spécial.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password2">Confirmer le mot de passe</label>
        <input
          type="password"
          id="password2"
          name="password2"
          class="form-input"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px; justify-content:center;">
        Créer mon compte
      </button>
    </form>

    <div class="auth-footer">
      Déjà inscrit ? <a href="{% url 'login' %}">Se connecter</a>
    </div>
  </div>
</div>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
