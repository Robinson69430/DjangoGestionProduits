{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">Stock</div>
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-sub">Bon retour parmi nous.</p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
          <button class="alert-close">×</button>
        </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="vous@exemple.com"
          value="{{ request.POST.email|default:'' }}"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px; justify-content:center;">
        Se connecter
      </button>
    </form>

    <div class="auth-footer">
      Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
    </div>
  </div>
</div>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
